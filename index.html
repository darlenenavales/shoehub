<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShoeHub</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1542291026-7eec264c27ff') no-repeat center center/cover;
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .hero h1 {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 10px;
    }

    .card img {
      height: 220px;
      object-fit: cover;
    }

    .btn-custom {
      background-color: #000;
      color: #fff;
    }

    .btn-custom:hover {
      background-color: #444;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">👟 ShoeHub</a>
    
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#products">Shop</a></li>
        <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div>
    <h1>Step Into Style 👟</h1>
    <p>Find your perfect pair today</p>
    <a href="#products" class="btn btn-light mt-3">Shop Now</a>
  </div>
</section>

<!-- Products -->
<section id="products" class="py-5">
  <div class="container">
    <h2 class="text-center mb-4">Featured Shoes</h2>
    <div class="row g-4">

      <!-- Shoe 1 -->
      <div class="col-md-4">
        <div class="card">
          <img src="https://images.unsplash.com/photo-1528701800489-20be3c9e0e0d" class="card-img-top">
          <div class="card-body text-center">
            <h5 class="card-title">Running Shoes</h5>
            <p>1559.99</p>
            <button class="btn btn-custom">Buy Now</button>
          </div>
        </div>
      </div>

      <!-- Shoe 2 -->
      <div class="col-md-4">
        <div class="card">
          <img src="https://images.unsplash.com/photo-1519741497674-611481863552" class="card-img-top">
          <div class="card-body text-center">
            <h5 class="card-title">Sneakers</h5>
            <p>1779.99</p>
            <button class="btn btn-custom">Buy Now</button>
          </div>
        </div>
      </div>

      <!-- Shoe 3 -->
      <div class="col-md-4">
        <div class="card">
          <img src="https://images.unsplash.com/photo-1600185365483-26d7c4f0c6b5" class="card-img-top">
          <div class="card-body text-center">
            <h5 class="card-title">Casual Shoes</h5>
            <p>1449.99</p>
            <button class="btn btn-custom">Buy Now</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
